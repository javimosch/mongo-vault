version: "3.8"

services:
  app:
    build: .
    ports:
      - "3011:3011"
    volumes:
      - ./data:/app/data
    env_file: .env
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
